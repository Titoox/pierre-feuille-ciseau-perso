<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,600;0,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Pierre Feuille Ciseaux</title>
  </head>
  <body>
    <header>
      <img src="images/logo.svg" alt="Logo du jeu Pierre Feuille Ciseaux" />
      <div id="score-box">
        <p id="texte-score">Score</p>
        <p id="score">0</p>
      </div>
    </header>
    <main>
      <div id="icones">
        <div id="pierre"><img src="images/icon-rock.svg" alt="Pierre" /></div>
        <div id="feuille">
          <img src="images/icon-paper.svg" alt="Feuille" />
        </div>
        <div id="ciseaux">
          <img src="images/icon-scissors.svg" alt="Ciseaux" />
        </div>
      </div>
    </main>
    <button id="regles">Règles</button>
    <script src="script.js"></script>
  </body>
</html>
